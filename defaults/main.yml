---
interlink_type_of_node: "kubernetes"  # or slurm
interlink_namespace: interlink
interlink_node_name: interlink-slurm-vk
interlink_port: 30443
interlink_run_smoke_test: false

interlink_base_dir: /opt/interlink
interlink_data_dir: "{{ interlink_base_dir }}/data"
interlink_work_dir: "{{ interlink_base_dir }}/work"
interlink_home_dir: "{{ interlink_base_dir }}/home"
interlink_service_user: "{{ ansible_user | default('root') }}"
interlink_service_group: "{{ ansible_user | default('root') }}"
interlink_socket_path: "{{ interlink_base_dir }}/.plugin.sock"
interlink_socket_url: "unix://{{ interlink_socket_path }}"
interlink_artifact_dir: "{{ playbook_dir }}/artifacts/{{ interlink_node_name }}"
interlink_remote_cert_dir: "/tmp/{{ interlink_node_name }}-certs"
interlink_edge_ip: "{{ ansible_default_ipv4.address }}"
interlink_edge_hostname: "{{ ansible_fqdn | default(inventory_hostname) }}"
interlink_edge_url: "https://{{ interlink_edge_hostname }}"
interlink_tls_cert_days: 365

interlink_version: 0.6.1-patch1
interlink_slurm_plugin_version: 0.6.1
interlink_chart_version: 0.6.1
virtual_kubelet_image: ghcr.io/interlink-hq/interlink/virtual-kubelet-inttw:0.6.1-patch1
virtual_kubelet_deployment_name: "{{ interlink_node_name }}-node"

# Backward compatibility with previous variable name.
type_of_node: "{{ interlink_type_of_node }}"

slurm_partition: debug
slurm_default_cpu: 1
slurm_default_memory: 1G
slurm_job_time: "00:10:00"
slurm_extra_flags: []

interlink_slurm_detect_capabilities: true
interlink_slurm_capability_node: ""
interlink_slurm_capabilities_artifact_name: slurm-capabilities.yml
interlink_slurm_capabilities_file: "{{ interlink_artifact_dir }}/{{ interlink_slurm_capabilities_artifact_name }}"

slurm_gpu_enabled: true
slurm_gpu_flavor: "{{ slurm_partition }}-gpu"
slurm_gpu_partition: "{{ slurm_partition }}"
slurm_gpu_count: "{{ interlink_slurm_capability_gpu_count | default(0) }}"
slurm_gpu_model: "{{ interlink_slurm_capability_gpu_model | default('') }}"
slurm_gpu_default_cpu: "{{ interlink_slurm_capability_cpus | default(slurm_default_cpu) }}"
slurm_gpu_default_memory: "{{ (interlink_slurm_capability_memory_mb | string) ~ 'M' if interlink_slurm_capability_memory_mb is defined else slurm_default_memory }}"
slurm_gpu_gres: ""
slurm_gpu_extra_flags: []

virtual_node_cpu: 1
virtual_node_memory_gib: 1
virtual_node_pods: 10
virtual_node_accelerators: []
virtual_kubelet_cpu_request: 100m
virtual_kubelet_cpu_limit: 500m
virtual_kubelet_memory_request: 128Mi
virtual_kubelet_memory_limit: 512Mi

kubeconfig_path: /etc/kubernetes/admin.conf

interlink_release_base_url: "https://github.com/interlink-hq/interlink/releases/download/{{ interlink_version }}"
interlink_slurm_plugin_release_base_url: "https://github.com/interlink-hq/interlink-slurm-plugin/releases/download/{{ interlink_slurm_plugin_version }}"

---
- name: Ensure local artifact directory exists on Ansible controller
  ansible.builtin.file:
    path: "{{ interlink_artifact_dir }}"
    state: directory
    mode: "0777"
  delegate_to: localhost

- name: Fetch client mTLS artifacts for Virtual Kubelet
  ansible.builtin.fetch:
    src: "{{ item.src }}"
    dest: "{{ interlink_artifact_dir }}/{{ item.dest }}"
    flat: true
  loop:
    - src: "{{ interlink_base_dir }}/certs/ca.pem"
      dest: ca.crt
    - src: "{{ interlink_base_dir }}/certs/client-cert.pem"
      dest: tls.crt
    - src: "{{ interlink_base_dir }}/certs/client-key.pem"
      dest: tls.key

- name: Fetch detected Slurm worker capabilities for Virtual Kubelet
  ansible.builtin.fetch:
    src: "{{ interlink_base_dir }}/config/{{ interlink_slurm_capabilities_artifact_name }}"
    dest: "{{ interlink_slurm_capabilities_file }}"
    flat: true
  when: interlink_slurm_detect_capabilities | bool
